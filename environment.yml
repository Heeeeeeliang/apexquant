name: apexquant
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  - python>=3.10,<3.13
  - pip
  # Core scientific stack (conda-forge)
  - numpy>=1.24
  - pandas>=2.0
  - scipy>=1.11
  - matplotlib>=3.7
  - scikit-learn>=1.3
  - plotly>=5.0
  - tqdm>=4.0
  - loguru>=0.7
  - pydantic>=2.0
  - python-dotenv>=1.0
  - requests>=2.28
  # ML: LightGBM + PyTorch (pytorch channel for torch)
  - lightgbm>=4.0
  - pytorch>=2.0
  # App framework
  - streamlit>=1.30
  - fastapi>=0.100
  - uvicorn>=0.23
  # Finance / data
  - arch>=6.0
  - yfinance>=0.2
  # pandas-ta ships only on PyPI, not conda-forge — install via pip
  - pip:
      - pandas-ta>=0.3
      - openai>=1.0
      - anthropic>=0.20
